name: Sync Notion availability data

on:
  schedule:
    - cron: '0 6 * * *' # every day at 06:00 UTC
  workflow_dispatch: {} # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch availability data from Notion
        run: node scripts/sync-notion.js
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}

      - name: Commit and push if data changed
        run: |
          git config user.name "notion-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/up-assets.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "sync: update availability from Notion"
            git push
          fi
